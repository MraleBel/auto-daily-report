name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  RUST_VERSION: stable

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            args: ""
            rust-target: ""
          - name: macos-apple-silicon
            os: macos-14
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Auto Daily Report ${{ github.ref_name }}"
          releaseBody: |
            Windows users should download the .exe installer.
            Apple Silicon Mac users should download the .dmg installer.
            This early build is distributed without a paid Apple Developer certificate. If macOS blocks the first launch, open System Settings > Privacy & Security and choose Open Anyway, or right-click the app and choose Open.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
