name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"
  RUST_VERSION: stable

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            args: ""
            rust-target: ""
          - name: macos-apple-silicon
            os: macos-14
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate macOS signing and notarization secrets
        if: matrix.name == 'macos-apple-silicon'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required macOS signing secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::macOS release builds require Apple code signing and notarization secrets."
            exit 1
          fi

      - name: Import Apple Developer certificate
        if: matrix.name == 'macos-apple-silicon'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ["APPLE_CERTIFICATE"].strip()
          Path("certificate.p12").write_bytes(base64.b64decode(raw))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_INFO="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -n 1)"
          if [ -z "$CERT_INFO" ]; then
            echo "::error::No 'Developer ID Application' signing identity was found in the imported certificate."
            exit 1
          fi

          CERT_ID="$(echo "$CERT_INFO" | awk -F'\"' '{print $2}')"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Validate updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

          if printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | grep -q '\\n'; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY appears to contain escaped \\n sequences. Paste the raw private key contents with real line breaks into the GitHub Secret."
            exit 1
          fi

          KEY_HEADER="$(node - <<'NODE'
          const input = process.env.TAURI_SIGNING_PRIVATE_KEY || "";
          const normalized = input.trim();
          const headers = [
            "untrusted comment: minisign secret key",
            "untrusted comment: rsign encrypted secret key",
          ];

          if (headers.some((header) => normalized.startsWith(header))) {
            process.stdout.write(normalized.split(/\r?\n/, 1)[0]);
            process.exit(0);
          }

          try {
            const decoded = Buffer.from(normalized, "base64").toString("utf8").trim();
            const header = headers.find((candidate) => decoded.startsWith(candidate));
            if (header) {
              process.stdout.write(header);
            }
          } catch {}
          NODE
          )"

          if [ -z "$KEY_HEADER" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY must contain either the raw minisign/rsign private key text or the exact base64 file contents generated by Tauri signer. Do not store a file path, escaped text, or the public key."
            exit 1
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Auto Daily Report ${{ github.ref_name }}"
          releaseBody: |
            See README.md and docs/release.md for installer, updater, and signing notes.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
